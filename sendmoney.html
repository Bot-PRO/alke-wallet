<!DOCTYPE html>
<html lang="es" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Enviar dinero a terceros</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">    
    <link rel="stylesheet" href="transaction.css">    

	<style>
        html, body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%) !important; 
            min-height: 100vh;
        }
    </style>
    
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100 w-100 py-1">
    
    <main>

        <div class="div-form  text-white p-1">
            <div>
                <a href="menu.html" class="btn btn-link text-dark text-decoration-none small text-center">&larr; Volver al menú</a>
            </div>
                
            <!-- formulario principal -->
            <form class="grupo-form text-white p-1 m-1">
                <!-- buscador -->
                <div class="form-group d-flex flex-column justify-content-center gap-2 mb-3 ">
                    <!-- botón que abre el modal -->
                    <button class="btn-agregar-contacts py-3 mb-1 mx-2" type="button" data-bs-toggle="modal" 
                    data-bs-target="#modalContacto">Agregar nuevo contacto</button>
                    
                    <input type="text" class=" buscar-contacto  mx-1 py-2 " placeholder="Buscar contacto...">
                    <button type="button" class="btn btn-principal mx-2 py-2">Buscar</button>
                    
                </div>
                            
                <!-- listado de contactos registrados -->
                <div class="results-container d-flex justify-content-center p-2">
                    <ul class=" lista-contactos  p-3 overflow-auto" id="contacts-list">
                    <!--  aqui van los contactos -->
                    </ul>
                </div>
            </form>

        </div>
            
    </main>

        <!-- formulario modal -->
        <!-- el modal -->
        <div class="modal fade " id="modalContacto">
            <div class="modal-dialog">
                <div class="modal-content small mx-0 bg-transparent ">
                    <div class="  p-3 mt-3 mx-1 mb-0 modal-header grupo-form">
                        <h5 class="modal-title text-decoration-none text-center text-white">Agregar Contacto</h5>
                    </div>
                    <div class="agree-contact modal-body grupo-form ">
                        <!-- contenido del formulario modal  -->
                        <form action="#" id="formulario-modal-agregar" class="formulario-modal form-group d-flex flex-column gap-2">
                            <label for="name-contacto" class="form-label">Nombre:</label>
                            <input id="name-contacto" type="text" class="form-control" placeholder="Escribe el nombre del contacto..." name="name" required>
                            <label for="alias-contacto" class="form-label">Alias:</label>
                            <input id="alias-contacto" type="text" class="form-control" placeholder="Escribe el nombre del contacto..." name="name" required>
                            
                            <label for="email-contacto" class="form-label">Email del Contacto:</label>
                            <input id="email-contacto" type="email" class="form-control" placeholder="Escribe el email del contacto (opcional)..." name="email">
							
							<select class="form-select" name="tipodecuenta" id="tipoDeCuenta" required>
								<option value="">Tipo de Cuenta</option>
								<option value="debito">Débito</option>
								<option value="credito">Crédito</option>
								<option value="prepago">Prepago</option>
								<option value="masterCard">Master Card</option>
							</select >

                            <label for="number-contacto" class="form-label">N° de Cuenta:</label>
                            <input id="number-contacto" type="number" class="form-control" placeholder="Escribe el numero de cuenta..." name="name" required>


                            <button type="submit" id="guardar-contacto" class="btn btn-principal mt-2 w-10">Guardar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        
    <!-- Jquery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- script -->
    <script src="transaction.js"></script>
</body>
</html>
