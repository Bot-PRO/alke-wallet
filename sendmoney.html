<!DOCTYPE html>
<html lang="es" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Enviar dinero a terceros</title>

	

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">    
    <link rel="stylesheet" href="transaction.css">    

	<style>
        html, body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%) !important; 
            min-height: 100vh;
        }
    </style>
    
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100 w-100 py-3">
    
    <main>

        <div class="div-form  text-white p-1">
            <!-- formulario principal -->
            <form class="grupo-form text-white p-1 m-1">
                <!-- buscador -->
                <div class="form-group d-flex justify-content-between gap-2 mb-3 ">
                    <input type="text" class="form-control" placeholder="Buscar contacto...">
                    <button type="button" class="btn btn-principal">Buscar</button>
                </div>
                <!-- listado de contactos registrados -->
                <div class="results-container   d-flex justify-content-center">
                    <ul class="list-group px-2 py-1" id="contacts-list">
                    
                    </ul>
                </div>
            </form>
            
            <!-- botón que abre el modal -->
            <button class="btn-agregar-contacts p-2 m-3" type="button" data-bs-toggle="modal" 
            data-bs-target="#modalContacto">Agregar nuevo contacto</button>
            <div>
                <a href="menu.html" class="btn btn-link text-dark text-decoration-none small text-center">&larr; Volver al menú</a>
            </div>
        </div>
            
    </main>

        <!-- formulario modal -->
        <!-- el modal -->
        <div class="modal fade " id="modalContacto">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header grupo-form">
                        <h5 class="modal-title  text-white">Nuevo Contacto</h5>
                    </div>
                    <div class="modal-body grupo-form">
                        <!-- contenido del formulario modal  -->
                        <form action="#" class="form-group">
                            <input type="text" class="form-control" placeholder="Escribe el nombre del contacto..." name="name" required>
							
							<select name="tipoDeCuenta" id="tipoDeCuenta">
								<option value="cuenta">Seleccione Tipo de Cuenta</option>
								<option value="debito">Débito</option>
								<option value="credito">Crédito</option>
								<option value="prepago">Prepago</option>
								<option value="masterCard">Master Card</option>
							</select >

                            <input type="number" class="form-control" placeholder="Escribe el numero de cuenta..." name="name" required>

                            <input type="text" class="form-control" placeholder="Escribe el email del contacto (opcional)..." name="email">

                            <button type="submit" class="btn btn-principal  mt-2 w-10">Guardar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        
    <!-- Jquery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- script -->
    <script src="transaction.js"></script>
</body>
</html>
