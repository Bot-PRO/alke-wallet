<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Depostio y Retiro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>
    <main>
        <!-- menu de navegacion del Depostio -->
        <form action="#" method="post">
            <div class="card mx-auto my-5 px-3 pb-3" style="max-width: 370px; box-shadow: 1px 1px 20px rgb(4, 0, 0);">
                
                <div class="card-header bg-white">
                    <h3>Deposito y Retiro</h3>
                </div>

                <div class="card-body">
                    <div class="form-group ">
                        <label for="monto">Monto:</label>
                        <input type="number" name="mondo" id="monto" class="form-control border border-dark mt-1">
                    </div>

                    <div class="form-group d-flex gap-3 mt-1 mb-2 mx-0">
                        <button type="button" class="btn btn-primary ">Depositar</button>
                        <button type="button" class="btn btn-danger ">Retirar</button>
                    </div>
                    <div>
                        <a href="menu.html" class="btn btn-link text-dark text-decoration-none small text-center">&larr; Volver al menú</a>
                    </div>
                </div>
            </div>
        </form>
    </main>
    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
