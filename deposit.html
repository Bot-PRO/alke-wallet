<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- error de favicon -->
    <link rel="icon" href="data:," />

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/deposit.css" />

    <style>
      html,
      body {
        background: linear-gradient(
          135deg,
          #020617 0%,
          #0f172a 100%
        ) !important;
        min-height: 100vh;
      }
    </style>

    <title>Depostio y Retiro</title>
  </head>
  <body>
    <main>
      <!-- menu de navegacion del Depostio -->
      <form action="#" method="post">
        <div
          class="card mx-auto my-5 px-3 pb-3"
          style="max-width: 370px; box-shadow: 1px 1px 20px rgb(4, 0, 0)"
        >
          <div class="card-header bg-white">
            <h3>Deposito y Retiro</h3>
          </div>

          <div class="card-body">
            <div class="form-group">
              <label for="monto">Monto:</label>
              <input
                type="number"
                name="mondo"
                id="monto"
                class="form-control border border-dark mt-1"
              />
            </div>

            <div class="form-group d-flex gap-3 mt-1 mb-2 mx-0">
              <button type="button" class="btn btn-primary" id="depositar">
                Depositar
              </button>
              <button type="button" class="btn btn-danger" id="retirar">
                Retirar
              </button>
            </div>
            <div>
              <a
                href="menu.html"
                class="btn btn-link text-dark text-decoration-none small text-center"
                >&larr; Volver al menú</a
              >
            </div>
          </div>
        </div>
      </form>
    </main>

    <!-- Jquery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- script -->
    <script type="module" src="js/deposit.js"></script>
  </body>
</html>
