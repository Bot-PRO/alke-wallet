<!doctype html>
<html lang="es">
  <head>
    <!-- Metadatos básicos -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alke Wallet - Login</title>

    <!-- Estilos externos -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/login.css" />

    <!-- Estilos locales de la página -->
    <style>
      html,
      body {
        background: linear-gradient(135deg, #020617 0%, #0f172a 100%) !important;
        min-height: 100vh;
      }
    </style>
  </head>

  <body class="d-flex justify-content-center align-items-center vh-100 w-100">
    <main class="w-100 d-flex justify-content-center px-3">
      <!-- Formulario de inicio de sesión -->
      <form action="#" id="enviar-form" method="post">
        <div
          class="tarjeta-login card border border-dark pb-3 px-2 pt-3 w-100"
          style="max-width: min(500px, 90vw); box-shadow: 1px 1px 20px rgb(101, 100, 100);"
        >
          <h2 class="card-header text-center text-white mb-2">Inicio de sesión</h2>

          <div class="cuerpo-form d-flex flex-column card-body rounded text-white px-3 pt-2 pb-4">
            <!-- Email -->
            <div class="d-flex flex-column form-group mb-3 mx-2">
              <label for="email">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="Escribe tu Email..."
                name="email"
                autocomplete="username"
              />
            </div>

            <!-- Password -->
            <div class="d-flex flex-column form-group mb-4 mx-2">
              <label for="password">Password</label>
              <input
                id="password"
                type="password"
                class="form-control"
                placeholder="Escribe tu Password..."
                name="password"
                autocomplete="current-password"
              />
            </div>

            <!-- Botón de envío -->
            <div class="d-flex flex-column justify-content-center mt-2 mb-2">
              <button type="submit" class="btn btn-secondary border-dark btn-lg mb-lg-3 mb-2 mx-3">
                Iniciar Sesión
              </button>
            </div>

            <!-- Mensajes de error -->
            <p id="mensaje-error" class="text-danger text-center small mt-2"></p>
            <p id="error-usuario-incorrecto" class="text-danger text-center small mt-2"></p>
          </div>
        </div>
      </form>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
