<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Movimientos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>
    
    <main>

        <!-- Fila de Bootstrap para dividir en dos columnas -->
        <div class="row g-2 mt-2" >
        
            <!-- Bloque de Ingresos -->
            <div class="col-6">
                <div class="p-2 border rounded bg-light text-center">
                <span class="small text-muted d-block">Ingresos</span>
                <!-- 'data' guarda el valor real en el atributo value -->
                <data value="25000" class="text-success fw-bold">+$25.000</data>
                </div>
            </div>

            <!-- Bloque de Egresos -->
            <div class="col-6">
                <div class="p-2 border rounded bg-light text-center">
                <span class="small text-muted d-block">Egresos</span>
                <data value="9500" class="text-danger fw-bold">-$9.500</data>
                </div>
            </div>
        </div>

        
    </main>
    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
