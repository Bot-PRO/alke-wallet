<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movimientos</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- error de favicon -->
    <link rel="icon" href="data:," />

    <!-- Estilos globales y de transacciones -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/transaction.css" />

    <!-- Fondo degradado oscuro para toda la página -->
    <style>
      html,
      body {
        background: linear-gradient(
          135deg,
          #020617 0%,
          #0f172a 100%
        ) !important;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div
              class="cuerpo-de-movimiento mt-5 card d-flex justify-content-center"
            >
              <div>
                <a
                  href="menu.html"
                  class="btn btn-link text-dark text-decoration-none small text-white text-center"
                  >&larr; Volver al menú
                </a>
              </div>
              <div
                class="cabecera-de-tarjeta card-header d-flex align-items-center justify-content-center"
              >
                <h2 class="text-center text-white">Movimientos</h2>
              </div>
              <div class="cuerpo-lista card-body">
                <ul class="list-group cuerpo-de-lista" id="transaction-list">
                  <!-- Las transacciones se insertan aqui mediante JavaScript -->
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS (incluye Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Lógica de contactos y transacciones -->
    <script type="module" src="js/transaction.js"></script>
  </body>
</html>
